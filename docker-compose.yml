services:
  app:
    build: .
    # restart: always
    env_file: .env
    environment:
      CONFIG_PATH: /app/config.yaml
      DATABASE_URL: postgresql://tgproxy:tgproxy@postgres:5432/tgproxy
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - ./sessions:/app/sessions
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: tgproxy
      POSTGRES_PASSWORD: tgproxy
      POSTGRES_DB: tgproxy
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tgproxy"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
